<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebus-Start</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <header>
        <section id="websiteExtra">
            <a href="rebus.html" class="plainLinks" id="backBtnLink"><button class="mainBackBtn">&lt;&lt;&lt;</button></a>
        </section>
        <section id="websiteTitle">
            <h1>Rebus</h1>
        </section>
        <nav id="websiteNav">
            <div id="websiteNavExtra"></div>
            <div class="menuWrapper">
                <div id="threeBars">
                    <div class="Bars"></div><div class="Bars"></div><div class="Bars"></div>
                </div>
                <div class="menuContent">
                    <a href="../../home.html">Home</a>
                    <a href="../../about.html">About</a>
                </div>
            </div>
        </nav>
    </header>
    <section class="separator"></section>
    <main class="gamesMain">
        <section id="gamesExtra1"></section>
        <section class="gameArea">
            <div class="gameWrapper">
                <div class="ownerDisplayStyle" id="itemCredit"></div>
                <span class="triesDisplayStyle" id="triesDisplay" ></span>
                <div class="questionContainer">
                    <p class="questionDisplayStyle" id="questionDisplay">Loading riddle...</p>
                    <div id="inputArea">
                        <input class="userGuessStyle" type="text" id="userGuess" placeholder="Type your guess here..." autocomplete="off">
                        <button class="submitGuessBtnStyle" id="submitGuessBtn">Submit</button>
                    </div>
                    <div id="lockoutArea" class="hidden">
                        <p class="replyStyle">Out of tries! Try again in: <span id="rebusTimer">23:59:59</span></p>
                    </div>
                    <p class="replyStyle" id="feedbackDisplay"></p>
                    <p class="replyStyle" id="answerDisplay" class="hidden"></p>
                </div>
                <div class="buttonGroup">
                    <button class="showAnswerBtnStyle" id="showAnswerBtn">Give Up?</button>
                    <button class="nextQuestionBtnStyle" id="nextQuestionBtn">Next Rebus&gt;&gt;</button>
                </div>
            </div>
        </section>
        <section id="gamesExtra2"></section>
    </main>
    <script src="../SHARED FILES/common.js" defer></script>
    <script src="startScript.js" defer></script>
</body>
</html>
